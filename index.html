<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capture Card Player</title>
  </head>
  <body>
    <div id="app">
      <header class="toolbar">
        <div class="toolbar__row">
          <div class="toolbar__column">
            <div class="dropdown dropdown--layout" data-role="layout-dropdown" aria-haspopup="listbox" aria-expanded="false">
              <button type="button" class="dropdown__trigger" data-role="layout-trigger" aria-label="Select layout" aria-controls="layout-listbox">
                <svg class="icon" width="18" height="18" viewBox="0 0 24 24">
                  <use href="/icons.svg#layout-split" />
                </svg>
                <span class="dropdown__trigger-label" data-role="layout-trigger-label">Single source</span>
                <svg class="icon dropdown__chevron" width="14" height="14" viewBox="0 0 24 24">
                  <use href="/icons.svg#dropdown-chevron" />
                </svg>
              </button>
              <ul id="layout-listbox" class="dropdown__list" data-role="layout-list" role="listbox" aria-label="Layout options"></ul>
            </div>
            <div class="swap-button--layout hidden" data-role="swap-sources">
              <button type="button" class="swap-button" id="swapButton">
                <svg class="icon" width="18" height="18" viewBox="0 0 24 24">
                  <use href="/icons.svg#swap" />
                </svg>
                <span class="swap-button__label">Swap Sources</span>
                <span class="swap-button__spacer" />
              </button>
            </div>
          </div>

          <div class="toolbar__column toolbar__sources">
            <div class="toolbar__source-row" data-role="slot-1-row">
              <div class="dropdown" data-role="device-dropdown" data-slot="1" aria-haspopup="listbox" aria-expanded="false">
                <button type="button" class="dropdown__trigger" aria-label="Select a source for slot 1" aria-controls="slot1-listbox">
                  <span class="dropdown__trigger-label">— Select a source —</span>
                  <svg class="icon dropdown__chevron" width="14" height="14" viewBox="0 0 24 24">
                    <use href="/icons.svg#dropdown-chevron" />
                  </svg>
                </button>
                <ul id="slot1-listbox" class="dropdown__list" role="listbox" aria-label="Capture sources for slot 1"></ul>
              </div>
              <button type="button" class="connect-btn" data-role="connect-btn" data-slot="1">
                <svg class="icon connect-btn__icon" width="18" height="18" viewBox="0 0 24 24">
                  <use href="/icons.svg#icon-plug" />
                </svg>
                <span class="connect-btn__label">Connect</span>
              </button>
            </div>

            <div class="toolbar__source-row toolbar__source-row--hidden" data-role="slot-2-row">
              <div class="dropdown" data-role="device-dropdown" data-slot="2" aria-haspopup="listbox" aria-expanded="false">
                <button type="button" class="dropdown__trigger" aria-label="Select a source for slot 2" aria-controls="slot2-listbox">
                  <span class="dropdown__trigger-label">— Select a source —</span>
                  <svg class="icon dropdown__chevron" width="14" height="14" viewBox="0 0 24 24">
                    <use href="/icons.svg#dropdown-chevron" />
                  </svg>
                </button>
                <ul id="slot2-listbox" class="dropdown__list" role="listbox" aria-label="Capture sources for slot 2"></ul>
              </div>
              <button type="button" class="connect-btn" data-role="connect-btn" data-slot="2">
                <svg class="icon connect-btn__icon" width="18" height="18" viewBox="0 0 24 24">
                  <use href="/icons.svg#icon-plug" />
                </svg>
                <span class="connect-btn__label">Connect</span>
              </button>
            </div>
          </div>
        </div>
      </header>

      <main class="stage-wrap">
        <section class="stage" data-role="stage" data-layout="single" aria-label="Video Feeds Container">
          <div class="player player--paused" data-slot="1">
            <video class="player__video" playsinline></video>

            <div class="player__no-signal" aria-live="polite">
              <div class="player__no-signal-dots">
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
              </div>
              <span>Select a source above and click Connect</span>
            </div>

            <div class="player__controls">
              <button type="button" class="player__control-btn" data-role="play-btn" aria-label="Play / pause">
                <svg class="icon" width="18" height="18" viewBox="0 0 24 24">
                  <use href="/icons.svg#icon-player-play" />
                </svg>
              </button>

              <div class="player__volume-group">
                <button type="button" class="player__control-btn" data-role="mute-btn" aria-label="Mute / unmute">
                  <svg class="icon" width="18" height="18" viewBox="0 0 24 24">
                    <use href="/icons.svg#icon-volume" />
                  </svg>
                </button>
                <input type="range" class="player__volume-slider" data-role="volume-slider" min="0" max="100" step="1" aria-label="Volume Level" />
              </div>

              <div class="player__spacer"></div>

              <button type="button" class="player__control-btn" data-role="fullscreen-btn" aria-label="Toggle fullscreen">
                <svg class="icon" width="18" height="18" viewBox="0 0 24 24">
                  <use href="/icons.svg#icon-fullscreen-enter" />
                </svg>
              </button>
            </div>
          </div>

          <div class="player player--paused player--hidden" data-slot="2">
            <video class="player__video" playsinline></video>

            <div class="player__no-signal" aria-live="polite">
              <div class="player__no-signal-dots">
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
                <div class="player__no-signal-dot"></div>
              </div>
              <span>Select a source above and click Connect</span>
            </div>

            <div class="player__controls">
              <button type="button" class="player__control-btn" data-role="play-btn" aria-label="Play / pause">
                <svg class="icon" width="18" height="18" viewBox="0 0 24 24">
                  <use href="/icons.svg#icon-player-play" />
                </svg>
              </button>

              <div class="player__volume-group">
                <button type="button" class="player__control-btn" data-role="mute-btn" aria-label="Mute / unmute">
                  <svg class="icon" width="18" height="18" viewBox="0 0 24 24">
                    <use href="/icons.svg#icon-volume" />
                  </svg>
                </button>
                <input type="range" class="player__volume-slider" data-role="volume-slider" min="0" max="100" step="1" aria-label="Volume Level" />
              </div>

              <div class="player__spacer"></div>

              <button type="button" class="player__control-btn" data-role="fullscreen-btn" aria-label="Toggle fullscreen">
                <svg class="icon" width="18" height="18" viewBox="0 0 24 24">
                  <use href="/icons.svg#icon-fullscreen-enter" />
                </svg>
              </button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
